<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Training Adventure</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>

    <div id="game-container">
        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- UI Layer: Login -->
        <div id="login-screen" class="screen active">
            <div class="pixel-box login-box">
                <h1>星際員工培訓</h1>
                <p>請輸入員工編號以開始</p>
                <input type="text" id="employee-id" placeholder="Employee ID" maxlength="10">
                <button id="start-btn" class="pixel-btn">登錄系統</button>
                <button id="rules-btn" class="pixel-btn secondary">游戲規則</button>
            </div>
        </div>

        <!-- UI Layer: Rules Modal -->
        <div id="rules-modal" class="modal hidden">
            <div class="pixel-box modal-content">
                <h2>游戲規則</h2>
                <p>1. 完成教學獲取初始加成。</p>
                <p>2. 與NPC交互並擊敗4隻怪獸。</p>
                <p>3. 答對題目攻擊怪獸，答錯扣血。</p>
                <p>4. 收集4個碎片通關。</p>
                <button id="close-rules-btn" class="pixel-btn">關閉</button>
            </div>
        </div>

        <!-- UI Layer: HUD -->
        <div id="hud" class="hidden">
            <div class="status-bar">
                <div class="hp-bar-container">
                    <span class="label">HP:</span>
                    <div class="hp-bar"><div id="player-hp-fill" style="width: 100%;"></div></div>
                    <span id="hp-text">40000/40000</span>
                </div>
                <div class="fragments-container">
                    <span class="label">碎片:</span>
                    <span id="fragment-count">0/4</span>
                </div>
                <div class="timer-container">
                    <span class="label">時間:</span>
                    <span id="game-timer">00:00</span>
                </div>
            </div>
        </div>

        <!-- UI Layer: Dialogue -->
        <div id="dialogue-box" class="hidden">
            <div class="portrait-container">
                <div id="portrait" class="pixel-portrait"></div> <!-- Avatar -->
            </div>
            <div class="text-container">
                <h3 id="speaker-name">Name</h3>
                <p id="dialogue-text">...</p>
                <div id="dialogue-options" class="hidden">
                    <!-- Buttons injected here -->
                </div>
                <button id="next-dialogue-btn" class="pixel-btn small">▼</button>
            </div>
        </div>

        <!-- UI Layer: Battle Overlay -->
        <div id="battle-screen" class="screen hidden">
            <div class="monster-area">
                <div class="monster-hp-bar"><div id="monster-hp-fill" style="width: 100%;"></div></div>
                <div id="monster-sprite" class="pixel-monster"></div>
            </div>
            <div class="battle-ui">
                <div id="battle-question-box" class="pixel-box">
                    <p id="battle-question-text">Question goes here...</p>
                    <div id="battle-answers"></div>
                </div>
            </div>
            <div id="damage-effect" class="hidden"></div>
        </div>

        <!-- UI Layer: End Screen -->
        <div id="end-screen" class="screen hidden">
            <div class="pixel-box result-box">
                <h1 id="end-title">通關成功!</h1>
                <div class="stats">
                    <p>員工編號: <span id="end-employee-id"></span></p>
                    <p>通關時間: <span id="end-time"></span></p>
                    <p>等級: <span id="end-level"></span></p>
                    <p>剩餘血量: <span id="end-hp"></span></p>
                    <p>收集碎片: <span id="end-fragments"></span></p>
                </div>
                <h2>排行榜</h2>
                <div class="leaderboard-container">
                    <table id="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>員工編號</th>
                                <th>碎片</th>
                                <th>HP</th>
                                <th>時間</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Leaderboard items -->
                        </tbody>
                    </table>
                </div>
                <button onclick="location.reload()" class="pixel-btn">返回主頁</button>
            </div>
        </div>

        <!-- Mobile Controls - Virtual Joystick -->
        <div id="mobile-controls" class="hidden">
            <div class="joystick-container">
                <div id="joystick-bg" class="joystick-bg">
                    <div id="joystick-stick" class="joystick-stick"></div>
                </div>
            </div>
            <div class="action-pad">
                <button id="btn-interact" class="a-btn">A</button>
            </div>
        </div>

        <!-- Background Music -->
        <audio id="bgMusic" loop preload="auto">
            <source src="assets/sounds/bg-music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script src="js/data.js"></script>
    <script src="js/input.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = "https://rpnmyvzfyaelxlsoyzux.supabase.co";
        const SUPABASE_KEY = "sb_publishable_7BRo0Hhfqbxx4zOrDmLuzw_AvwOHRvd";
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <script>
        async function submitScore(stats) {
            // Call the Cloudflare Function to save score securely
            try {
                const response = await fetch('https://spacegame.trainingctr.workers.dev/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(stats)
                });

                if (!response.ok) {
                    throw new Error('Failed to submit score');
                }

                const data = await response.json();
                console.log("Score saved successfully!", data);
                return data;
            } catch (error) {
                console.error("Error submitting score:", error);
                throw error;
            }
        }

        async function loadLeaderboard() {
            try {
                const client = window.supabaseClient;
                if (!client) throw new Error('Supabase client not initialized');

                const { data, error } = await client
                    .from('space_game')
                    .select('*')
                    .order('fragments', { ascending: false })
                    .order('hp', { ascending: false })
                    .order('play_time', { ascending: true })
                    .limit(50);

                if (error) {
                    console.warn('Error loading leaderboard from Supabase:', error);
                    return JSON.parse(localStorage.getItem('leaderboard') || '[]');
                }

                return data || [];
            } catch (error) {
                console.error("Error loading leaderboard:", error);
                return JSON.parse(localStorage.getItem('leaderboard') || '[]');
            }
        }
    </script>
    </body>
    </html>
